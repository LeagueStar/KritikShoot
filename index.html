<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>KritikShoot — Survival Shooter</title>
  <!-- Google Fonts: Orbitron (display) + Rajdhani (body/HUD) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>

  <!-- =====================================================
       START SCREEN
       All inline styles moved to style.css. No style="" here.
  ====================================================== -->
  <div id="startScreen" class="screen glass-panel active" role="main" aria-label="Start Screen">
    <div class="screen__inner">
      <div class="logo-lockup">
        <span class="logo-sub">— SURVIVAL SHOOTER —</span>
        <h1 class="logo-title">KritikShoot</h1>
        <div class="logo-line"></div>
      </div>

      <div class="start-form">
        <label for="nicknameInput" class="sr-only">Enter Nickname</label>
        <input
          type="text"
          id="nicknameInput"
          class="input-field"
          placeholder="Enter callsign…"
          maxlength="15"
          autocomplete="off"
          spellcheck="false"
        />
        <button id="startBtn" class="btn btn--primary">
          <span class="btn__label">DEPLOY</span>
          <span class="btn__glow"></span>
        </button>
      </div>

      <!-- Local leaderboard injected here by UIManager -->
      <div id="localLeaderboard" class="leaderboard" aria-label="Local Leaderboard"></div>
    </div>
  </div>

  <!-- =====================================================
       GAME CANVAS — the entire game world is painted here
  ====================================================== -->
  <canvas id="gameCanvas" tabindex="0" aria-label="Game Canvas"></canvas>

  <!-- =====================================================
       MOBILE CONTROLS
       Visibility toggled by UIManager via class, not inline style
  ====================================================== -->
  <div id="mobileControls" class="mobile-ui" aria-hidden="true">
    <div id="joystick" class="joystick" role="presentation">
      <div class="joystick__knob"></div>
    </div>
    <button id="shootBtn" class="btn btn--shoot" aria-label="Shoot">FIRE</button>
  </div>

  <!-- =====================================================
       LEVEL-UP SCREEN
       Pause overlay; CSS transition handles show/hide
  ====================================================== -->
  <div
    id="levelUpScreen"
    class="screen screen--overlay glass-panel hidden"
    role="dialog"
    aria-modal="true"
    aria-label="Level Up — Choose Upgrade"
  >
    <div class="screen__inner screen__inner--compact">
      <h2 class="screen__title">LEVEL UP</h2>
      <p class="screen__subtitle">Select your upgrade, soldier.</p>
      <!-- Upgrade buttons — data-type drives the upgrade key in Player.upgrades -->
      <div class="upgrade-grid" role="list">
        <button class="btn btn--upgrade" data-type="speed"       role="listitem">⚡ Move Speed</button>
        <button class="btn btn--upgrade" data-type="health"      role="listitem">❤ Max Health</button>
        <button class="btn btn--upgrade" data-type="damage"      role="listitem">💥 Damage</button>
        <button class="btn btn--upgrade" data-type="fireRate"    role="listitem">🔥 Fire Rate</button>
        <button class="btn btn--upgrade" data-type="bulletSpeed" role="listitem">🚀 Bullet Speed</button>
        <button class="btn btn--upgrade" data-type="critChance"  role="listitem">🎯 Crit Chance</button>
        <button class="btn btn--upgrade" data-type="lifesteal"   role="listitem">🩸 Lifesteal</button>
      </div>
    </div>
  </div>

  <!-- =====================================================
       RESTART BUTTON — appears on game over
  ====================================================== -->
  <button id="restartBtn" class="btn btn--danger btn--fixed hidden" aria-label="Restart Mission">
    ↩ Restart Mission
  </button>

  <!-- Single-file game engine — deferred so DOM is ready -->
  <script src="./game.js" defer></script>
</body>
</html>
